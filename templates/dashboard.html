<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DocIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Dashboard de Pacientes</h1>
        <table class="table table-striped mt-4">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Condição Médica</th>
                </tr>
            </thead>
            <tbody>
                {% for patient in patients %}
                <tr>
                    <td>{{ patient.id }}</td>
                    <td><a href="{{ url_for('chat', patient_id=patient.id) }}">{{ patient.name }}</a></td>
                    <td>{{ patient.email }}</td>
                    <td>{{ patient.condition }}</td>
                </tr>
                {% endfor %}
            </tbody>
            
        </table>
        <div class="text-center mt-4">
            <a href="/add" class="btn btn-success">Adicionar Paciente</a>
            <a href="/" class="btn btn-secondary">Voltar à Página Inicial</a>
        </div>
        
    </div>
</body>
</html>
