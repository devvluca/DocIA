<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com IA - DocIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Chat com IA</h1>
        <h2 class="text-center">{{ patient.name }}</h2>
        <p class="text-center">Condição Médica: {{ patient.condition }}</p>

        <div class="mt-4">
            <div class="chat-box border p-3" style="max-height: 400px; overflow-y: auto;">
                {% for message in messages %}
                    <div class="mb-3">
                        <strong>{{ 'Você:' if message.role == 'user' else 'IA:' }}</strong>
                        <p>{{ message.content }}</p>
                    </div>
                {% endfor %}
            </div>
        </div>

        <form method="POST" class="mt-4">
            <div class="mb-3">
                <textarea name="message" class="form-control" placeholder="Digite sua mensagem..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
            <a href="/dashboard" class="btn btn-secondary">Voltar ao Dashboard</a>
        </form>
    </div>
</body>
</html>
